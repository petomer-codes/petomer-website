<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --pink-main: #8f3d5c;
      --pink-dark: #6f2945;
      --pink-soft: #fcf3f6;
      --pink-border: #ead5dc;
      --paper: rgba(255, 255, 255, 0.82);
      --text-main: #555555;
      --text-strong: #404040;
      --shadow-soft: 0 14px 40px rgba(124, 63, 88, 0.1);
      --shadow-nav: 0 6px 24px rgba(95, 40, 61, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(143, 61, 92, 0.08), transparent 24%),
        linear-gradient(180deg, #fffdfd 0%, var(--pink-soft) 46%, #f9eef2 100%);
      color: var(--text-main);
      line-height: 1.5;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
      padding: 16px 28px;
      box-shadow: var(--shadow-nav);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 18px;
      font-size: 0.98rem;
    }

    .navbar a:hover {
      opacity: 0.95;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
    }

    .brand-name {
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      margin-left: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      transition: background-color 160ms ease, transform 160ms ease;
    }

    .brand-link:hover {
      background: rgba(255, 255, 255, 0.24);
      transform: translateY(-1px);
    }

    .brand-link svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .container {
      max-width: 920px;
      margin: 28px auto 48px;
      padding: 28px 34px 34px;
      background: var(--paper);
      border: 1px solid rgba(244, 194, 209, 0.9);
      border-radius: 0;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(4px);
    }

    .container::after {
      content: "";
      display: block;
      clear: both;
    }

    .nav-links {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .menu-toggle {
      display: none;
      border: 0;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      padding: 8px 12px;
      font-size: 0.98rem;
      cursor: pointer;
    }

    .nav-links > a,
    .dropdown > a {
      display: inline-block;
      padding: 8px 10px;
      border-radius: 999px;
      transition: background-color 160ms ease, transform 160ms ease;
    }

    .nav-links > a:hover,
    .dropdown > a:hover {
      background-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    .dropdown {
      position: relative;
      display: inline-block;
      padding-bottom: 10px;
      margin-bottom: -10px;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: rgba(242, 110, 152, 0.97);
      background: rgba(111, 41, 69, 0.97);
      box-shadow: 0 12px 30px rgba(128, 54, 82, 0.22);
      z-index: 1;
      border-radius: 16px;
      min-width: 240px;
      padding: 12px 8px 8px;
    }

    .dropdown-right .dropdown-content {
      left: auto;
      right: 0;
    }

    .dropdown-content a {
      color: white;
      padding: 10px 12px;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      margin: 0;
      border-radius: 10px;
    }

    .dropdown-content a:hover {
      background-color: rgba(255, 255, 255, 0.14);
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .dropdown:focus-within .dropdown-content {
      display: block;
    }

    h1 {
      margin: 0 0 24px;
      color: var(--text-strong);
      font-size: clamp(2rem, 4vw, 2.85rem);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .home-title {
      display: none;
    }

    h2 {
      color: var(--text-strong);
      margin-top: 24px;
      margin-bottom: 12px;
      font-size: 1.35rem;
    }

    .container > h2:first-of-type {
      margin-top: 0;
      font-size: 2rem;
      line-height: 1.15;
    }

    h3 {
      color: var(--text-strong);
      margin-top: 22px;
      margin-bottom: 8px;
      font-size: 1.05rem;
      text-transform: none;
      letter-spacing: 0;
    }

    p,
    li {
      font-size: 1rem;
    }

    ul,
    ol {
      padding-left: 1.4rem;
    }

    li + li {
      margin-top: 5px;
    }

    .home-list,
    .home-sublist {
      list-style: none;
      padding-left: 0;
      margin: 0 0 18px;
    }

    .home-list > li,
    .home-sublist > li {
      position: relative;
      padding-left: 1.35rem;
    }

    .home-list > li::before,
    .home-sublist > li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.58em;
      width: 8px;
      height: 8px;
      background: var(--pink-main);
      border-radius: 999px;
    }

    .home-sublist {
      margin-top: 10px;
      margin-bottom: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(143, 61, 92, 0.12);
    }

    .home-sublist > li::before {
      width: 6px;
      height: 6px;
      background: var(--pink-dark);
    }

    .home-intro {
      display: flex;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 12px;
    }

    .home-intro-image {
      flex: 0 0 250px;
      width: 250px;
      margin: 0;
    }

    .home-intro-side {
      width: 250px;
      text-align: center;
    }

    .home-intro-side p {
      margin-top: 10px;
      margin-bottom: 0;
    }

    .home-intro-copy {
      min-width: 0;
      flex: 1;
    }

    .home-intro-copy p {
      margin-top: 0;
    }

    .home-intro-copy h3 {
      margin-top: 10px;
    }

    a {
      color: var(--pink-dark);
    }

    a:hover {
      color: #9b4967;
    }

    strong {
      color: var(--text-strong);
    }

    .social-links {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: rgba(143, 61, 92, 0.1);
      color: white;
      transition: background-color 160ms ease, transform 160ms ease;
    }

    .social-link:hover {
      background: rgba(143, 61, 92, 0.18);
      transform: translateY(-1px);
    }

    .social-link svg {
      width: 18px;
      height: 18px;
      fill: var(--pink-dark);
    }

    img {
      max-width: 100%;
      height: auto;
      box-shadow: 0 12px 28px rgba(156, 91, 115, 0.18);
    }

    hr {
      border: 0;
      border-top: 1px solid var(--pink-border);
      margin: 28px 0;
    }

    @media (max-width: 760px) {
      .navbar {
        align-items: center;
        flex-wrap: wrap;
        padding: 16px 18px;
      }

      .menu-toggle {
        display: inline-block;
        margin-left: auto;
      }

      .nav-links {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        padding-top: 10px;
      }

      .nav-links.is-open {
        display: flex;
      }

      .navbar a {
        margin-left: 0;
      }

      .brand {
        width: auto;
      }

      .dropdown {
        width: 100%;
        padding-bottom: 0;
        margin-bottom: 0;
      }

      .dropdown-content {
        position: static;
        display: none;
        min-width: 0;
        margin-top: 6px;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: none;
        padding: 4px 0 0;
      }

      .dropdown:hover .dropdown-content,
      .dropdown:focus-within .dropdown-content {
        display: block;
      }

      .dropdown-content a {
        padding-left: 18px;
      }

      .container {
        margin: 18px 14px 32px;
        padding: 22px 18px 24px;
        border-radius: 0;
      }

      .home-intro {
        flex-direction: column;
      }

      .home-intro-side {
        width: 100%;
        text-align: left;
      }

      .home-intro-image {
        width: 100%;
        max-width: 250px;
      }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="brand">
    <span class="brand-name">Paige Tomer</span>
    <a class="brand-link" href="https://www.linkedin.com/in/paige-tomer-54a024216" target="_blank" rel="noopener noreferrer" aria-label="Paige Tomer on LinkedIn">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6.94 8.5H3.56V20h3.38zm.22-3.69A1.97 1.97 0 0 0 5.24 2.8a1.97 1.97 0 0 0-1.91 2.01 1.95 1.95 0 0 0 1.89 2 1.97 1.97 0 0 0 1.94-2m12.9 7.54c0-2.93-1.56-4.29-3.64-4.29a3.15 3.15 0 0 0-2.84 1.56h-.05V8.5h-3.24c.04.74 0 11.5 0 11.5h3.24v-6.42c0-.34.03-.69.13-.93.27-.69.89-1.41 1.94-1.41 1.37 0 1.92 1.07 1.92 2.63V20H21s.04-5.37.04-7.65"/>
      </svg>
    </a>
    <a class="brand-link" href="mailto:ptomer@uw.edu" aria-label="Email Paige Tomer">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 5H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2m0 3.2-8 5-8-5V7l8 5 8-5z"/>
      </svg>
    </a>
  </div>
  <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">Menu</button>
  <div class="nav-links" id="site-nav">
    <a href="/petomer-website/">Home</a>

    <div class="dropdown">
      <a href="/petomer-website/research/">Research</a>
      <div class="dropdown-content">
        <a href="/petomer-website/research/honorsthesis.html">Causal inference + w.soccer</a>
        <a href="/petomer-website/research/bbtrajectories.html">LCMM + breast bud growth</a>
        <a href="/petomer-website/research/pb-measurement-error.html">PB + measurement diff</a>
        <a href="/petomer-website/research/u5mr-spatial-correlation.html">Spatial correlation + U5MR</a>
      </div>
    </div>

    <div class="dropdown">
      <a href="/petomer-website/posts">Posts</a>
      <div class="dropdown-content">
       </div>
    </div>
    
    <div class="dropdown dropdown-right">
      <a href="/petomer-website/projects/catie-trials.html">Projects</a>
      <div class="dropdown-content">
        <a href="/petomer-website/projects/catie-trials.html">SIBDS @ Columbia</a>
        <a href="/petomer-website/projects/covid19-birth-rates.html">ISP @ Leiden</a>
      </div>
    </div>
  </div>
</div>


  <!-- Page Content -->
  <div class="container">
    <h1{% if page.url == "/" %} class="home-title"{% endif %}>{{ page.title }}</h1>
    {{ content }}
  </div>

  <script>
    const menuToggle = document.querySelector(".menu-toggle");
    const siteNav = document.querySelector("#site-nav");

    if (menuToggle && siteNav) {
      menuToggle.addEventListener("click", function () {
        const isOpen = siteNav.classList.toggle("is-open");
        menuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });
    }
  </script>

</body>
</html>
